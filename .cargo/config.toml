# Cross-compilation configuration for Android targets.
#
# Prerequisites:
#   1. Install Android NDK (r26+ recommended)
#   2. Install the Rust targets:
#        rustup target add aarch64-linux-android armv7-linux-androideabi
#
# The paths below assume the NDK is at ~/Android/Sdk/ndk/<version>.
# build-mobile.sh auto-detects the NDK and exports CC/AR env vars for the cc crate.

[target.aarch64-linux-android]
linker = "/home/mahmood/Android/Sdk/ndk/29.0.14206865/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang"

[target.armv7-linux-androideabi]
linker = "/home/mahmood/Android/Sdk/ndk/29.0.14206865/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi31-clang"
