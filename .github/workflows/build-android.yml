name: Build Android APK

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: 27.1.12297006
  # Minimum Android API level for the NDK clang linker suffix
  ANDROID_API: 31

jobs:
  build-android:
    name: Build Android APK (arm64-v8a + armeabi-v7a)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java (required by Gradle) ────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Node.js (required by React Native) ───────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      # ── Android SDK + NDK ────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Configure NDK environment
        run: |
          NDK_HOME="$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}"
          TOOLCHAIN_BIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "ANDROID_NDK_HOME=$NDK_HOME" >> "$GITHUB_ENV"
          echo "$TOOLCHAIN_BIN" >> "$GITHUB_PATH"

      # ── Rust ─────────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-android-

      # ── Build Rust .so (both ABIs) ────────────────────────────────────
      - name: Build mobile-backend for arm64-v8a
        run: cargo build --target aarch64-linux-android -p a-scanner-mobile --release

      - name: Build mobile-backend for armeabi-v7a
        run: cargo build --target armv7-linux-androideabi -p a-scanner-mobile --release

      - name: Copy libmobile_backend.so to jniLibs
        run: |
          JNILIBS_BASE="mobile/android/app/src/main/jniLibs"
          mkdir -p "$JNILIBS_BASE/arm64-v8a" "$JNILIBS_BASE/armeabi-v7a"
          cp target/aarch64-linux-android/release/libmobile_backend.so "$JNILIBS_BASE/arm64-v8a/"
          cp target/armv7-linux-androideabi/release/libmobile_backend.so "$JNILIBS_BASE/armeabi-v7a/"
          ls -lhR "$JNILIBS_BASE/"

      # ── Install JS dependencies ──────────────────────────────────────
      - name: Install mobile npm dependencies
        working-directory: mobile
        run: npm ci

      # ── Decode release keystore (if secrets are configured) ──────────
      - name: Decode release keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > mobile/android/app/release.keystore

      # ── Build APK ────────────────────────────────────────────────────
      - name: Build release APK
        working-directory: mobile/android
        env:
          ASCANNER_RELEASE_STORE_FILE: release.keystore
          ASCANNER_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          ASCANNER_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          ASCANNER_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

      # ── Upload artifact ──────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: a-scanner-android-${{ github.sha }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
